<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360"><defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#08111f"/><stop offset="1" stop-color="#111827"/></linearGradient><filter id="g"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1200" height="360" rx="28" fill="url(#bg)"/><text x="54" y="58" fill="#f8fafc" font-family="Inter,Arial" font-size="30" font-weight="700">From sensor degradation to protective action</text><text x="54" y="90" fill="#94a3b8" font-family="Inter,Arial" font-size="16">The research target is early warning before trajectory failure becomes safety critical.</text><line x1="90" y1="235" x2="1110" y2="235" stroke="#334155" stroke-width="6" stroke-linecap="round"/><g font-family="Inter,Arial" text-anchor="middle"><circle cx="140" cy="235" r="18" fill="#22d3ee" filter="url(#g)"/><text x="140" y="180" fill="#67e8f9" font-size="17" font-weight="700">DEGRADATION</text><text x="140" y="205" fill="#cbd5e1" font-size="14">blur · dropout · bias</text><circle cx="370" cy="235" r="18" fill="#a78bfa" filter="url(#g)"/><text x="370" y="180" fill="#c4b5fd" font-size="17" font-weight="700">HEALTH DRIFT</text><text x="370" y="205" fill="#cbd5e1" font-size="14">tracks · NIS · covariance</text><circle cx="600" cy="235" r="18" fill="#fbbf24" filter="url(#g)"/><text x="600" y="180" fill="#fde68a" font-size="17" font-weight="700">PREDICTION</text><text x="600" y="205" fill="#cbd5e1" font-size="14">risk · calibration · bounds</text><circle cx="830" cy="235" r="18" fill="#fb7185" filter="url(#g)"/><text x="830" y="180" fill="#fda4af" font-size="17" font-weight="700">SHIELD</text><text x="830" y="205" fill="#cbd5e1" font-size="14">slow · hold · relocalize</text><circle cx="1060" cy="235" r="18" fill="#34d399" filter="url(#g)"/><text x="1060" y="180" fill="#6ee7b7" font-size="17" font-weight="700">RECOVERY</text><text x="1060" y="205" fill="#cbd5e1" font-size="14">resume or safe halt</text></g><path d="M170 235h170M400 235h170M630 235h170M860 235h170" stroke="#64748b" stroke-width="3" stroke-dasharray="8 8"/><rect x="455" y="286" width="290" height="42" rx="21" fill="#172554" stroke="#3b82f6"/><text x="600" y="313" text-anchor="middle" fill="#bfdbfe" font-family="Inter,Arial" font-size="15" font-weight="700">warning lead time is the key safety margin</text></svg>