<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc"><title id="title">SHIELD-VIO protective estimation pipeline</title><desc id="desc">Visual and inertial estimation, consistency diagnostics, calibrated failure prediction, shift detection, and navigation shielding.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071522"/><stop offset="1" stop-color="#2b263f"/></linearGradient><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12Z" fill="#7dd3fc"/></marker><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".3"/></filter></defs><rect width="1600" height="720" rx="28" fill="url(#bg)"/><text x="800" y="68" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="42" font-weight="700">SHIELD-VIO — Failure-Aware Visual–Inertial Autonomy</text><text x="800" y="108" text-anchor="middle" fill="#b7c9dc" font-family="Arial" font-size="21">Estimator introspection, calibrated warnings, domain-shift awareness, and protective navigation</text><g filter="url(#s)" font-family="Arial"><rect x="45" y="205" width="235" height="260" rx="24" fill="#112f49" stroke="#4f87b3" stroke-width="2"/><rect x="320" y="205" width="235" height="260" rx="24" fill="#12364a" stroke="#4d9a99" stroke-width="2"/><rect x="595" y="205" width="235" height="260" rx="24" fill="#173b43" stroke="#4dbb98" stroke-width="2"/><rect x="870" y="205" width="235" height="260" rx="24" fill="#34384b" stroke="#8a91d3" stroke-width="2"/><rect x="1145" y="205" width="235" height="260" rx="24" fill="#433246" stroke="#bd85cb" stroke-width="2"/><rect x="1420" y="205" width="135" height="260" rx="24" fill="#432f38" stroke="#d27d9f" stroke-width="2"/><g fill="#f8fafc" text-anchor="middle"><text x="162" y="250" font-size="17" font-weight="700">SENSING</text><text x="162" y="320" font-size="25" font-weight="700">Camera + IMU</text><text x="162" y="360" font-size="17" fill="#b7c9dc">feature tracks</text><text x="162" y="389" font-size="17" fill="#b7c9dc">preintegration</text><text x="437" y="250" font-size="17" font-weight="700">ESTIMATION</text><text x="437" y="320" font-size="25" font-weight="700">15-State ESKF</text><text x="437" y="360" font-size="17" fill="#b7c9dc">pose • velocity • biases</text><text x="437" y="389" font-size="17" fill="#b7c9dc">covariance</text><text x="712" y="250" font-size="17" font-weight="700">INTROSPECTION</text><text x="712" y="320" font-size="25" font-weight="700">Health &amp; Consistency</text><text x="712" y="360" font-size="17" fill="#b7c9dc">NIS • NEES</text><text x="712" y="389" font-size="17" fill="#b7c9dc">tracking • bias • drift</text><text x="987" y="250" font-size="17" font-weight="700">FAILURE REASONING</text><text x="987" y="320" font-size="25" font-weight="700">Calibrate &amp; Detect</text><text x="987" y="360" font-size="17" fill="#b7c9dc">probability • conformal</text><text x="987" y="389" font-size="17" fill="#b7c9dc">domain shift</text><text x="1262" y="250" font-size="17" font-weight="700">NAVIGATION SHIELD</text><text x="1262" y="320" font-size="25" font-weight="700">Protect &amp; Recover</text><text x="1262" y="360" font-size="17" fill="#b7c9dc">slow • hold • relocalize</text><text x="1262" y="389" font-size="17" fill="#b7c9dc">halt • emergency stop</text><text x="1487" y="250" font-size="14" font-weight="700">OUTPUT</text><text x="1487" y="320" font-size="18" font-weight="700">Safe</text><text x="1487" y="350" font-size="18" font-weight="700">Action</text><text x="1487" y="390" font-size="16" fill="#b7c9dc">+ trace</text></g></g><g stroke="#7dd3fc" stroke-width="4" marker-end="url(#a)"><line x1="280" y1="335" x2="305" y2="335"/><line x1="555" y1="335" x2="580" y2="335"/><line x1="830" y1="335" x2="855" y2="335"/><line x1="1105" y1="335" x2="1130" y2="335"/><line x1="1380" y1="335" x2="1405" y2="335"/></g><rect x="180" y="545" width="1240" height="100" rx="20" fill="#0a1d2d" stroke="#31526d" stroke-width="2"/><text x="800" y="585" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="23" font-weight="700">Safety-oriented estimation principle</text><text x="800" y="620" text-anchor="middle" fill="#b7c9dc" font-family="Arial" font-size="19">Trajectory accuracy alone is insufficient; the system must detect and communicate when its own estimate is becoming unreliable</text><text x="800" y="682" text-anchor="middle" fill="#7891a5" font-family="Arial" font-size="16">Conceptual research figure — not production VIO, hardware validation, or formal certification</text></svg>