<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SHIELD-VIO research architecture overview</title>
  <desc id="desc">A generated dark-theme overview of the SHIELD-VIO visual-inertial estimation, introspection, failure prediction, domain shift, navigation shielding, and recovery pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1a2d"/>
      <stop offset="1" stop-color="#071827"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dd3fc"/>
    </marker>
    <style>
      .title { font: 800 72px Inter,Segoe UI,Arial,sans-serif; fill:#f8fafc; letter-spacing:1px; }
      .subtitle { font: 400 27px Inter,Segoe UI,Arial,sans-serif; fill:#cbd5e1; }
      .section { font: 700 20px Inter,Segoe UI,Arial,sans-serif; fill:#e2e8f0; }
      .box-title { font: 700 18px Inter,Segoe UI,Arial,sans-serif; fill:#f8fafc; }
      .box-copy { font: 400 14px Inter,Segoe UI,Arial,sans-serif; fill:#cbd5e1; }
      .small { font: 600 13px Inter,Segoe UI,Arial,sans-serif; fill:#94a3b8; }
      .metric { font: 700 23px Inter,Segoe UI,Arial,sans-serif; fill:#f8fafc; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="30" fill="url(#bg)"/>
  <circle cx="1450" cy="80" r="250" fill="#0ea5e9" opacity="0.06"/>
  <circle cx="150" cy="820" r="300" fill="#6366f1" opacity="0.06"/>

  <g transform="translate(72 64)">
    <path d="M30 5 L68 20 L68 59 C68 91 48 112 30 124 C12 112 -8 91 -8 59 L-8 20 Z" fill="#0f2942" stroke="#7dd3fc" stroke-width="3"/>
    <circle cx="30" cy="57" r="20" fill="none" stroke="#e0f2fe" stroke-width="3"/>
    <path d="M30 29 V85 M2 57 H58" stroke="#38bdf8" stroke-width="3"/>
    <circle cx="30" cy="57" r="6" fill="#22c55e"/>
  </g>

  <text x="180" y="110" class="title">SHIELD-VIO</text>
  <text x="182" y="155" class="subtitle">Safety-hardened visual–inertial odometry with calibrated failure prediction</text>
  <text x="182" y="191" class="subtitle">and closed-loop navigation protection</text>
  <rect x="181" y="214" width="610" height="5" rx="2.5" fill="url(#hero)"/>

  <g transform="translate(1120 55)" filter="url(#shadow)">
    <rect width="410" height="170" rx="18" fill="#0b2238" stroke="#334155"/>
    <text x="24" y="36" class="section" fill="#7dd3fc">PRIMARY RESEARCH QUESTION</text>
    <text x="24" y="72" class="box-copy">Can a VIO estimator detect unreliability early enough</text>
    <text x="24" y="98" class="box-copy">to protect navigation, trigger recovery, and preserve</text>
    <text x="24" y="124" class="box-copy">calibrated confidence under degradation and shift?</text>
    <text x="24" y="151" class="small">Research prototype · claim-disciplined evaluation</text>
  </g>

  <text x="70" y="285" class="section">END-TO-END RESEARCH PIPELINE</text>

  <g filter="url(#shadow)">
    <g transform="translate(70 320)">
      <rect width="195" height="150" rx="18" fill="#0c2740" stroke="#0ea5e9" stroke-width="2"/>
      <circle cx="35" cy="35" r="17" fill="#0ea5e9" opacity="0.2"/>
      <path d="M25 35 h20 M35 25 v20" stroke="#7dd3fc" stroke-width="3"/>
      <text x="62" y="42" class="box-title">Sensors</text>
      <text x="24" y="78" class="box-copy">Camera frames</text>
      <text x="24" y="103" class="box-copy">IMU measurements</text>
      <text x="24" y="128" class="small">timestamps · calibration</text>
    </g>

    <g transform="translate(295 320)">
      <rect width="195" height="150" rx="18" fill="#102a22" stroke="#22c55e" stroke-width="2"/>
      <circle cx="35" cy="35" r="17" fill="#22c55e" opacity="0.18"/>
      <path d="M24 41 L32 31 L39 38 L48 27" fill="none" stroke="#86efac" stroke-width="3"/>
      <text x="62" y="42" class="box-title">Visual Front End</text>
      <text x="24" y="78" class="box-copy">Shi–Tomasi + LK</text>
      <text x="24" y="103" class="box-copy">track IDs · rejection</text>
      <text x="24" y="128" class="small">blur · brightness · survival</text>
    </g>

    <g transform="translate(520 320)">
      <rect width="195" height="150" rx="18" fill="#30250d" stroke="#f59e0b" stroke-width="2"/>
      <circle cx="35" cy="35" r="17" fill="#f59e0b" opacity="0.18"/>
      <path d="M24 42 C32 22 41 51 49 28" fill="none" stroke="#fcd34d" stroke-width="3"/>
      <text x="62" y="42" class="box-title">Preintegration</text>
      <text x="24" y="78" class="box-copy">ΔR · Δv · Δp</text>
      <text x="24" y="103" class="box-copy">bias Jacobians</text>
      <text x="24" y="128" class="small">covariance propagation</text>
    </g>

    <g transform="translate(745 320)">
      <rect width="195" height="150" rx="18" fill="#10213c" stroke="#818cf8" stroke-width="2"/>
      <circle cx="35" cy="35" r="17" fill="#818cf8" opacity="0.18"/>
      <ellipse cx="35" cy="35" rx="22" ry="10" fill="none" stroke="#a5b4fc" stroke-width="2" transform="rotate(-25 35 35)"/>
      <text x="62" y="42" class="box-title">15-State ESKF</text>
      <text x="24" y="78" class="box-copy">p · v · q · bₐ · bᵍ</text>
      <text x="24" y="103" class="box-copy">Joseph update</text>
      <text x="24" y="128" class="small">PSD stabilization</text>
    </g>

    <g transform="translate(970 320)">
      <rect width="195" height="150" rx="18" fill="#261a37" stroke="#c084fc" stroke-width="2"/>
      <circle cx="35" cy="35" r="17" fill="#c084fc" opacity="0.18"/>
      <path d="M22 45 C28 20 36 55 48 26" fill="none" stroke="#d8b4fe" stroke-width="3"/>
      <text x="62" y="42" class="box-title">Introspection</text>
      <text x="24" y="78" class="box-copy">NIS · NEES · covariance</text>
      <text x="24" y="103" class="box-copy">visual + IMU health</text>
      <text x="24" y="128" class="small">trends · residuals</text>
    </g>

    <g transform="translate(1195 320)">
      <rect width="195" height="150" rx="18" fill="#351a20" stroke="#fb7185" stroke-width="2"/>
      <circle cx="35" cy="35" r="17" fill="#fb7185" opacity="0.18"/>
      <path d="M35 20 L49 28 V40 C49 50 42 57 35 61 C28 57 21 50 21 40 V28 Z" fill="none" stroke="#fda4af" stroke-width="2.5"/>
      <text x="62" y="42" class="box-title">Failure Prediction</text>
      <text x="24" y="78" class="box-copy">rule + logistic</text>
      <text x="24" y="103" class="box-copy">conformal bounds</text>
      <text x="24" y="128" class="small">calibration metrics</text>
    </g>
  </g>

  <g stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)" opacity="0.85">
    <path d="M267 395 H287"/><path d="M492 395 H512"/><path d="M717 395 H737"/>
    <path d="M942 395 H962"/><path d="M1167 395 H1187"/>
  </g>

  <g transform="translate(70 515)" filter="url(#shadow)">
    <rect width="1460" height="290" rx="22" fill="#091827" stroke="#334155"/>
    <text x="28" y="40" class="section">CLOSED-LOOP SAFETY AND RECOVERY</text>

    <g transform="translate(28 72)">
      <rect width="420" height="180" rx="16" fill="#0d2134" stroke="#38bdf8"/>
      <text x="22" y="34" class="box-title">Domain shift and calibrated confidence</text>
      <circle cx="84" cy="105" r="39" fill="#6366f1" opacity="0.65"/>
      <circle cx="132" cy="82" r="31" fill="#22c55e" opacity="0.65"/>
      <circle cx="159" cy="127" r="34" fill="#f97316" opacity="0.65"/>
      <path d="M230 142 L250 118 L270 126 L292 76 L316 94 L340 51 L370 65" fill="none" stroke="#7dd3fc" stroke-width="4"/>
      <text x="230" y="165" class="small">confidence adapts under shift</text>
    </g>

    <g transform="translate(482 72)">
      <rect width="430" height="180" rx="16" fill="#0d2134" stroke="#f59e0b"/>
      <text x="22" y="34" class="box-title">Navigation shield state machine</text>
      <g transform="translate(22 70)">
        <rect width="72" height="42" rx="10" fill="#14532d"/><text x="13" y="27" class="small" fill="#dcfce7">NORMAL</text>
        <rect x="88" width="72" height="42" rx="10" fill="#713f12"/><text x="99" y="27" class="small" fill="#fef3c7">WARN</text>
        <rect x="176" width="72" height="42" rx="10" fill="#7c2d12"/><text x="188" y="27" class="small" fill="#ffedd5">SLOW</text>
        <rect x="264" width="72" height="42" rx="10" fill="#7f1d1d"/><text x="279" y="27" class="small" fill="#fee2e2">HOLD</text>
        <rect x="352" width="58" height="42" rx="10" fill="#450a0a"/><text x="365" y="27" class="small" fill="#fecaca">HALT</text>
        <path d="M72 21 H84 M160 21 H172 M248 21 H260 M336 21 H348" stroke="#fcd34d" stroke-width="3" marker-end="url(#arrow)"/>
      </g>
      <text x="22" y="150" class="small">hysteresis · dwell time · stale sensor override</text>
    </g>

    <g transform="translate(946 72)">
      <rect width="486" height="180" rx="16" fill="#0d2134" stroke="#22c55e"/>
      <text x="22" y="34" class="box-title">Protective and recovery actions</text>
      <text x="24" y="72" class="box-copy">• reduce commanded speed</text>
      <text x="24" y="101" class="box-copy">• hold position / request relocalization</text>
      <text x="24" y="130" class="box-copy">• return to safe state / emergency stop</text>
      <rect x="326" y="62" width="126" height="74" rx="14" fill="#123923" stroke="#4ade80"/>
      <path d="M352 99 H423 M407 83 L425 99 L407 115" stroke="#86efac" stroke-width="5" fill="none"/>
      <text x="337" y="158" class="small">safe command output</text>
    </g>
  </g>

  <g transform="translate(70 840)">
    <text class="small">IMPLEMENTED: synthetic pipeline · feature tracking · preintegration · ESKF · degradation · detectors · shift · shield · dataset adapters</text>
    <text x="1110" class="small">DATASET EXECUTION &amp; HARDWARE VALIDATION: PENDING</text>
  </g>
</svg>