<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400"><rect width="1200" height="400" rx="28" fill="#08111f"/><text x="54" y="58" fill="#e6edf3" font-family="Arial" font-size="30" font-weight="700">Calibrated Failure Prediction and Domain-Shift Awareness</text><text x="54" y="91" fill="#8b9bb4" font-family="Arial" font-size="17">Deployable diagnostics remain separate from privileged degradation metadata</text><g font-family="Arial" text-anchor="middle"><rect x="55" y="135" width="245" height="150" rx="18" fill="#0d2237" stroke="#38bdf8" stroke-width="2"/><text x="177" y="174" fill="#7dd3fc" font-size="21" font-weight="700">Signals</text><text x="177" y="207" fill="#d4dde8" font-size="15">NIS • covariance • tracks</text><text x="177" y="232" fill="#d4dde8" font-size="15">blur • brightness • IMU health</text><text x="177" y="257" fill="#d4dde8" font-size="15">innovation history</text><rect x="360" y="135" width="225" height="150" rx="18" fill="#2a1b18" stroke="#fb923c" stroke-width="2"/><text x="472" y="174" fill="#fdba74" font-size="21" font-weight="700">Detectors</text><text x="472" y="207" fill="#d4dde8" font-size="15">rule baseline</text><text x="472" y="232" fill="#d4dde8" font-size="15">logistic baseline</text><text x="472" y="257" fill="#d4dde8" font-size="15">continuous risk score</text><rect x="645" y="135" width="230" height="150" rx="18" fill="#10261d" stroke="#4ade80" stroke-width="2"/><text x="760" y="174" fill="#86efac" font-size="21" font-weight="700">Calibration</text><text x="760" y="207" fill="#d4dde8" font-size="15">Brier • NLL • ECE • MCE</text><text x="760" y="232" fill="#d4dde8" font-size="15">split-conformal bounds</text><text x="760" y="257" fill="#d4dde8" font-size="15">empirical coverage</text><rect x="935" y="135" width="210" height="150" rx="18" fill="#211b38" stroke="#a78bfa" stroke-width="2"/><text x="1040" y="174" fill="#c4b5fd" font-size="21" font-weight="700">Shift Gate</text><text x="1040" y="207" fill="#d4dde8" font-size="15">possible • confirmed</text><text x="1040" y="232" fill="#d4dde8" font-size="15">severe shift</text><text x="1040" y="257" fill="#d4dde8" font-size="15">confidence multiplier</text><path d="M300 210H360M585 210H645M875 210H935" stroke="#94a3b8" stroke-width="3" marker-end="url(#a)"/></g><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/></marker></defs><text x="55" y="335" fill="#d4dde8" font-family="Arial" font-size="16">Output: calibrated risk estimate + uncertainty bound + domain-shift state + detector confidence</text><text x="55" y="365" fill="#64748b" font-family="Arial" font-size="15">Experimental • conformal guarantees depend on calibration assumptions and may degrade under non-exchangeable shift.</text></svg>