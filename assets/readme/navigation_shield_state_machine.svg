<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430"><rect width="1200" height="430" rx="28" fill="#08111f"/><text x="54" y="58" fill="#e6edf3" font-family="Arial" font-size="30" font-weight="700">Closed-Loop Navigation Shield and Recovery</text><text x="54" y="91" fill="#8b9bb4" font-family="Arial" font-size="17">Stateful protection with hysteresis, minimum dwell, stale-sensor override, and executable recovery selection</text><g font-family="Arial" text-anchor="middle"><rect x="45" y="150" width="145" height="82" rx="18" fill="#10261d" stroke="#4ade80" stroke-width="2"/><text x="117" y="198" fill="#86efac" font-size="18" font-weight="700">NORMAL</text><rect x="225" y="150" width="145" height="82" rx="18" fill="#2a2112" stroke="#facc15" stroke-width="2"/><text x="297" y="198" fill="#fde047" font-size="18" font-weight="700">WARNING</text><rect x="405" y="150" width="145" height="82" rx="18" fill="#2a2112" stroke="#fb923c" stroke-width="2"/><text x="477" y="198" fill="#fdba74" font-size="18" font-weight="700">SLOW DOWN</text><rect x="585" y="150" width="145" height="82" rx="18" fill="#2a1b18" stroke="#f97316" stroke-width="2"/><text x="657" y="188" fill="#fdba74" font-size="18" font-weight="700">HOLD</text><text x="657" y="211" fill="#fdba74" font-size="18" font-weight="700">POSITION</text><rect x="765" y="150" width="170" height="82" rx="18" fill="#211b38" stroke="#a78bfa" stroke-width="2"/><text x="850" y="188" fill="#c4b5fd" font-size="17" font-weight="700">RELOCALIZE</text><text x="850" y="211" fill="#c4b5fd" font-size="17" font-weight="700">REQUESTED</text><rect x="970" y="150" width="145" height="82" rx="18" fill="#341717" stroke="#ef4444" stroke-width="2"/><text x="1042" y="198" fill="#fca5a5" font-size="18" font-weight="700">HALT</text><path d="M190 191H225M370 191H405M550 191H585M730 191H765M935 191H970" stroke="#94a3b8" stroke-width="3" marker-end="url(#a)"/><rect x="430" y="300" width="340" height="78" rx="18" fill="#401313" stroke="#f43f5e" stroke-width="3"/><text x="600" y="334" fill="#fecdd3" font-size="20" font-weight="700">EMERGENCY STOP</text><text x="600" y="360" fill="#fda4af" font-size="15">critical risk • stale sensors • unsafe to continue</text><path d="M1042 232 C1042 288 800 300 770 332" stroke="#f43f5e" stroke-width="3" fill="none" marker-end="url(#r)"/></g><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/></marker><marker id="r" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#f43f5e"/></marker></defs><text x="55" y="410" fill="#64748b" font-family="Arial" font-size="15">Research Prototype • supervisory policy, not a formally verified safety controller.</text></svg>